<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Food Ordering System</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="menu-page">
    <nav class="navbar">
        <div class="logo"><i class="fas fa-utensils"></i> FoodHub</div>
        <div class="nav-links">
            <a href="menu.html" class="active">Menu</a>
            <a href="cart.html">
                <i class="fas fa-shopping-cart"></i> Cart
                <span id="cartCount" class="cart-count" style="position: relative; top: -10px;">0</span>
            </a>
            <a href="orders.html">My Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Our Delicious Menu</h1>
        
        <div class="category-filters">
            <button class="category-btn active" onclick="filterCategory('all')">All</button>
            <button class="category-btn" onclick="filterCategory('appetizers')">Appetizers</button>
            <button class="category-btn" onclick="filterCategory('main-course')">Main Course</button>
            <button class="category-btn" onclick="filterCategory('desserts')">Desserts</button>
            <button class="category-btn" onclick="filterCategory('beverages')">Beverages</button>
        </div>
        
        <div id="menuGrid" class="menu-grid">
            <!-- Menu items will be loaded dynamically -->
        </div>
    </div>

    <script src="/main.js"></script>
    <script>
        checkAuth();
        loadMenuItems();
        updateCartCount();
    </script>
</body>
</html>
