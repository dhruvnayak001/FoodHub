<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Food Ordering System</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="orders-page">
    <nav class="navbar">
        <div class="logo"><i class="fas fa-utensils"></i> FoodHub</div>
        <div class="nav-links">
            <a href="menu.html">Menu</a>
            <a href="cart.html">
                <i class="fas fa-shopping-cart"></i> Cart
                <span id="cartCount" class="cart-count" style="position: relative; top: -10px;">0</span>
            </a>
            <a href="orders.html" class="active">My Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="orders-container">
        <h1 class="page-title">My Order History</h1>

        <div id="ordersList">
            <!-- Orders will be loaded dynamically -->
        </div>

        <div id="noOrders" class="empty-cart" style="display: none;">
            <i class="fas fa-clipboard-list"></i>
            <h3>No orders yet</h3>
            <p>Your order history will appear here once you place your first order!</p>
            <a href="menu.html" class="btn-primary" style="display: inline-block; margin-top: 20px; text-decoration: none;">
                Browse Menu
            </a>
        </div>
    </div>

    <script src="/main.js"></script>
    <script>
        checkAuth();
        loadUserOrders();
        updateCartCount();
    </script>
</body>
</html>
