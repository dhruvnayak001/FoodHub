<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Food Ordering System</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="cart-page">
    <nav class="navbar">
        <div class="logo"><i class="fas fa-utensils"></i> FoodHub</div>
        <div class="nav-links">
            <a href="menu.html">Menu</a>
            <a href="cart.html" class="active">
                <i class="fas fa-shopping-cart"></i> Cart
                <span id="cartCount" class="cart-count" style="position: relative; top: -10px;">0</span>
            </a>
            <a href="orders.html">My Orders</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="cart-container">
        <h1 class="page-title">Your Shopping Cart</h1>
        
        <div id="cartContent">
            <div id="cartItems" class="cart-items">
                <!-- Cart items will be loaded dynamically -->
            </div>
            
            <div id="cartSummary" class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (10%)</span>
                    <span id="tax">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="total">$0.00</span>
                </div>
                <button class="checkout-btn" onclick="showCheckoutModal()">
                    <i class="fas fa-credit-card"></i> Proceed to Checkout
                </button>
            </div>
        </div>
        
        <div id="emptyCart" class="empty-cart" style="display: none;">
            <i class="fas fa-shopping-basket"></i>
            <h3>Your cart is empty</h3>
            <p>Browse our menu and add some delicious items!</p>
            <a href="menu.html" class="btn-primary" style="display: inline-block; margin-top: 20px; text-decoration: none;">
                Browse Menu
            </a>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Complete Your Order</h3>
                <span class="close-btn" onclick="closeCheckoutModal()">&times;</span>
            </div>
            <div id="checkoutMessage" class="message"></div>
            <form id="checkoutForm">
                <div class="form-group">
                    <label for="deliveryAddress">Delivery Address</label>
                    <textarea id="deliveryAddress" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label for="deliveryPhone">Phone Number</label>
                    <input type="tel" id="deliveryPhone" required>
                </div>
                <div class="form-group">
                    <label for="orderNotes">Order Notes (Optional)</label>
                    <textarea id="orderNotes" rows="2" placeholder="Any special instructions..."></textarea>
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-check"></i> Place Order
                </button>
            </form>
        </div>
    </div>

    <script src="/main.js"></script>
    <script>
        checkAuth();
        loadCart();
        document.getElementById('checkoutForm').addEventListener('submit', handleCheckout);
    </script>
</body>
</html>
